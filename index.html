<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Persona Booth</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "DM Sans", sans-serif;
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100%;
        background: #ffffff;
      }

      ::-webkit-scrollbar {
        display: none;
      }

      .persona-item {
        transition:
          transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
          background-color 0.2s ease,
          color 0.2s ease,
          border-color 0.2s ease;
        background: #000000;
        border: 1px solid transparent;
      }

      .persona-item .label,
      .persona-item .description,
      .persona-item .persona-id {
        transition: color 0.2s ease;
        color: #ffffff;
      }

      .persona-item:hover,
      .persona-item.selected {
        background: #ffffff;
        transform: scale(1.01);
        border-color: #111827;
      }

      .persona-item:hover .label,
      .persona-item:hover .description,
      .persona-item:hover .persona-id,
      .persona-item.selected .label,
      .persona-item.selected .description,
      .persona-item.selected .persona-id {
        color: #000000;
      }
    </style>
  </head>
  <body class="h-full flex items-center justify-center">
    <div
      id="widget"
      class="w-[280px] h-full bg-black text-white flex flex-col rounded-3xl overflow-hidden relative z-10 p-2"
    >
      <div class="rounded-[1.4rem] bg-white text-black px-4 py-4">
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="text-[10px] uppercase tracking-[0.24em] text-black/55">Persona Booth</p>
            <h1 class="mt-1 text-[18px] font-semibold tracking-tight">Live Persona Picker</h1>
          </div>
          <div
            id="statusPill"
            class="rounded-full border border-black/10 bg-black/5 px-3 py-1 text-[10px] uppercase tracking-[0.18em] text-black/65"
          >
            Idle
          </div>
        </div>

        <form id="searchForm" class="mt-4 flex gap-2" autocomplete="off">
          <label class="sr-only" for="searchInput">Search personas</label>
          <input
            id="searchInput"
            type="search"
            placeholder="Search personas"
            class="min-w-0 flex-1 rounded-2xl border border-black/10 bg-black/5 px-3 py-2 text-[13px] text-black placeholder:text-black/35 focus:border-black/25 focus:outline-none"
          />
          <button
            type="submit"
            class="rounded-2xl bg-black px-3 py-2 text-[11px] font-medium uppercase tracking-[0.16em] text-white"
          >
            Search
          </button>
        </form>

        <button
          id="resetButton"
          type="button"
          class="mt-2 text-[11px] font-medium uppercase tracking-[0.16em] text-black/55"
        >
          Reset
        </button>

        <p id="errorBanner" class="mt-3 hidden rounded-2xl bg-red-500/12 px-3 py-2 text-[12px] text-red-700"></p>
      </div>

      <div id="scrollRegion" class="mt-2 flex-1 overflow-y-auto px-0.5 pb-2">
        <div id="list" class="flex flex-col gap-2"></div>
        <div id="loadingState" class="px-3 py-4 text-center text-[11px] uppercase tracking-[0.18em] text-white/55">
          Loading personas
        </div>
      </div>
    </div>

    <script>
      const PERSONA_SELECT_MESSAGE_TYPE = "tattty.persona.select";
      const PERSONA_BRIDGE_CHANNEL_PREFIX = "tattty-persona-bridge";

      const statusPill = document.getElementById("statusPill");
      const errorBanner = document.getElementById("errorBanner");
      const searchForm = document.getElementById("searchForm");
      const searchInput = document.getElementById("searchInput");
      const resetButton = document.getElementById("resetButton");
      const list = document.getElementById("list");
      const scrollRegion = document.getElementById("scrollRegion");
      const loadingState = document.getElementById("loadingState");

      const state = {
        items: [],
        selectedId: null,
        nextCursor: "0",
        hasMore: true,
        isLoading: false,
        activeQuery: "",
      };

      function readConfig() {
        const url = new URL(window.location.href);
        const windowConfig = window.BOOTH_CONFIG || {};

        return {
          apiBaseUrl:
            url.searchParams.get("apiBaseUrl") ||
            windowConfig.apiBaseUrl ||
            "",
          bridgeId:
            url.searchParams.get("bridgeId") ||
            windowConfig.bridgeId ||
            "",
          bridgeKey:
            url.searchParams.get("bridgeKey") ||
            windowConfig.bridgeKey ||
            "",
          bridgeOrigin:
            url.searchParams.get("bridgeOrigin") ||
            windowConfig.bridgeOrigin ||
            "",
          initialPersonaId:
            url.searchParams.get("personaId") ||
            windowConfig.initialPersonaId ||
            "",
        };
      }

      const config = readConfig();

      function setStatus(label) {
        statusPill.textContent = label;
      }

      function showError(message) {
        errorBanner.textContent = message;
        errorBanner.classList.remove("hidden");
        setStatus("Error");
      }

      function clearError() {
        errorBanner.textContent = "";
        errorBanner.classList.add("hidden");
      }

      function normalizeApiBaseUrl(value) {
        return value.replace(/\/$/, "");
      }

      function getBridgeChannelName() {
        return `${PERSONA_BRIDGE_CHANNEL_PREFIX}:${config.bridgeId}:${config.bridgeKey}`;
      }

      function validateConfig() {
        if (!config.apiBaseUrl) {
          showError("Missing apiBaseUrl. Point this booth to your persona API origin.");
          return false;
        }

        if (!config.bridgeId || !config.bridgeKey) {
          showError("Missing bridgeId or bridgeKey. Both are required to isolate this booth.");
          return false;
        }

        return true;
      }

      function emitPersonaSelection(personaId) {
        const message = {
          source: "tattty-booth",
          type: PERSONA_SELECT_MESSAGE_TYPE,
          bridgeId: config.bridgeId,
          bridgeKey: config.bridgeKey,
          payload: { personaId },
        };

        if (window.parent && window.parent !== window && config.bridgeOrigin) {
          window.parent.postMessage(message, config.bridgeOrigin);
        }

        window.postMessage(message, window.location.origin);

        if ("BroadcastChannel" in window) {
          const channel = new BroadcastChannel(getBridgeChannelName());
          channel.postMessage(message);
          channel.close();
        }

        setStatus("Synced");
      }

      function createPersonaItem(persona) {
        const item = document.createElement("button");
        item.type = "button";
        item.className = "persona-item w-full rounded-[1.35rem] px-4 py-3 text-left";
        item.dataset.id = persona.id;

        if (state.selectedId === persona.id) {
          item.classList.add("selected");
        }

        item.innerHTML = `
          <div class="persona-id text-[10px] uppercase tracking-[0.2em] text-white/45">${persona.id}</div>
          <div class="label mt-1 text-[13px] font-medium leading-tight">${persona.label || persona.id}</div>
          <div class="description mt-1 text-[11px] leading-snug">${persona.description || "No description provided."}</div>
        `;

        item.addEventListener("click", () => {
          state.selectedId = persona.id;
          renderList();
          emitPersonaSelection(persona.id);
        });

        return item;
      }

      function renderList() {
        list.innerHTML = "";

        if (!state.items.length && !state.isLoading) {
          list.innerHTML = `
            <div class="rounded-[1.35rem] border border-white/10 bg-white/5 px-4 py-4 text-[12px] text-white/72">
              No personas found.
            </div>
          `;
          return;
        }

        state.items.forEach((persona) => {
          list.appendChild(createPersonaItem(persona));
        });
      }

      function setLoading(isLoading, label) {
        state.isLoading = isLoading;
        loadingState.textContent = label;
        loadingState.style.display = isLoading || state.hasMore ? "block" : "none";
      }

      async function fetchJson(path) {
        const response = await fetch(`${normalizeApiBaseUrl(config.apiBaseUrl)}${path}`);
        if (!response.ok) {
          throw new Error(`Persona API failed with HTTP ${response.status}`);
        }

        return response.json();
      }

      async function loadPersonas({ reset = false, query = "" } = {}) {
        if (state.isLoading) {
          return;
        }

        if (reset) {
          state.items = [];
          state.nextCursor = "0";
          state.hasMore = true;
          state.activeQuery = query.trim();
          renderList();
        }

        if (!state.hasMore && !state.activeQuery) {
          return;
        }

        clearError();
        setStatus(state.activeQuery ? "Searching" : "Loading");
        setLoading(true, state.activeQuery ? "Searching personas" : "Loading personas");

        try {
          const data = state.activeQuery
            ? await fetchJson(`/personas/search?q=${encodeURIComponent(state.activeQuery)}&limit=50`)
            : await fetchJson(`/personas?cursor=${encodeURIComponent(state.nextCursor)}&limit=50`);

          const incomingItems = Array.isArray(data.items) ? data.items : [];
          const deduped = new Map(state.items.map((item) => [item.id, item]));
          incomingItems.forEach((item) => {
            if (item && typeof item.id === "string") {
              deduped.set(item.id, item);
            }
          });

          state.items = Array.from(deduped.values());
          state.nextCursor = typeof data.nextCursor === "string" ? data.nextCursor : null;
          state.hasMore = Boolean(state.activeQuery ? false : state.nextCursor && state.nextCursor !== "0");

          if (!state.selectedId && config.initialPersonaId) {
            state.selectedId = config.initialPersonaId;
          }

          renderList();
          setStatus("Ready");
          setLoading(false, state.hasMore ? "Scroll for more" : "End of list");
        } catch (error) {
          const message = error instanceof Error ? error.message : "Failed to load personas";
          showError(message);
          setLoading(false, "Load failed");
        }
      }

      searchForm.addEventListener("submit", (event) => {
        event.preventDefault();
        void loadPersonas({ reset: true, query: searchInput.value });
      });

      resetButton.addEventListener("click", () => {
        searchInput.value = "";
        void loadPersonas({ reset: true, query: "" });
      });

      scrollRegion.addEventListener("scroll", () => {
        if (state.activeQuery || state.isLoading || !state.hasMore) {
          return;
        }

        const threshold = 120;
        const distanceFromBottom =
          scrollRegion.scrollHeight - scrollRegion.scrollTop - scrollRegion.clientHeight;

        if (distanceFromBottom <= threshold) {
          void loadPersonas();
        }
      });

      if (validateConfig()) {
        state.selectedId = config.initialPersonaId || null;
        void loadPersonas({ reset: true });
      } else {
        setLoading(false, "Configuration required");
      }
    </script>
  </body>
</html>
