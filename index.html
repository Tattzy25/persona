<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Persona Picker</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'DM Sans', sans-serif; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: #000; }
    ::-webkit-scrollbar { display: none; }
    .persona-item { transition: all 0.18s cubic-bezier(0.34, 1.56, 0.64, 1); background: #000; }
    .persona-item .label, .persona-item .description { transition: color 0.18s ease; color: #fff; }
    .persona-item:hover { background: #fff; transform: scale(1.015); }
    .persona-item:hover .label, .persona-item:hover .description { color: #000; }
    .persona-item.selected { background: #fff; }
    .persona-item.selected .label, .persona-item.selected .description { color: #000; }
    #drawerPanel { transform: translateY(100%); transition: transform 0.3s ease-out; }
    #drawerPanel.open { transform: translateY(0); }
  </style>
</head>
<body class="h-full bg-black">
  <main id="app" class="h-full w-full bg-black flex justify-center">
    <div class="w-[300px] h-full bg-black flex flex-col overflow-hidden relative">
      <div class="bg-white px-4 py-3 flex items-center justify-center rounded-2xl mx-2 my-1.5 h-[72px]">
        <button
          id="customBtn"
          class="bg-black text-white text-[13px] font-medium px-4 py-2 rounded-lg hover:bg-gray-800 transition-colors"
          type="button"
        >
          Custom Persona
        </button>
      </div>

      <div class="px-2 pb-2">
        <input
          id="searchInput"
          type="text"
          placeholder="Search personas..."
          class="w-full rounded-2xl border border-zinc-800 bg-black text-white text-[13px] px-4 py-3 outline-none placeholder:text-zinc-500"
        >
      </div>

      <div id="listViewport" class="flex-1 overflow-y-auto px-2 pb-[52%]">
        <div id="list" class="flex flex-col gap-2"></div>
        <div id="loading" class="hidden py-3 text-center text-[11px] text-zinc-500">Loading...</div>
        <div id="sentinel" class="h-10"></div>
      </div>

      <div
        id="drawerPanel"
        class="absolute bottom-0 left-1/2 z-30 flex w-[292px] -translate-x-1/2 flex-col rounded-t-3xl border border-zinc-200 bg-white"
        style="height: 50%;"
      >
        <textarea
          id="personaInput"
          placeholder="Enter custom persona..."
          class="flex-1 resize-none rounded-t-3xl border-none bg-white px-4 py-3 text-[12px] text-black focus:outline-none"
        ></textarea>
      </div>
    </div>
  </main>
</body>
</html>

  <script>
    const state = {
      items: [],
      offset: 0,
      pageSize: 50,
      selectedPersonaId: null,
      query: "",
      drawerOpen: false,
      loading: false,
      hasMore: true
    };

    const els = {
      list: document.getElementById("list"),
      loading: document.getElementById("loading"),
      sentinel: document.getElementById("sentinel"),
      searchInput: document.getElementById("searchInput"),
      customBtn: document.getElementById("customBtn"),
      drawerPanel: document.getElementById("drawerPanel"),
      personaInput: document.getElementById("personaInput"),
      listViewport: document.getElementById("listViewport")
    };

    async function fetchPersonas(reset = false) {
      if (state.loading) return;
      if (!state.hasMore && !reset) return;

      state.loading = true;
      els.loading.classList.remove("hidden");

      const response = await fetch("/api/personas/search", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          query: state.query,
          limit: state.pageSize,
          offset: reset ? 0 : state.offset
        })
      });

      const data = await response.json();

      state.items = reset ? data.items : [...state.items, ...data.items];
      state.offset = data.nextOffset ?? state.items.length;
      state.hasMore = data.hasMore ?? false;
      state.loading = false;

      renderList();
      updateLoadingState();
    }

    async function selectPersona(id) {
      state.selectedPersonaId = id;

      const response = await fetch("/api/personas/by-id", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id })
      });

      const data = await response.json();

      if (window.elementSdk?.setValue) {
        window.elementSdk.setValue("selected_persona_id", data.id);
        window.elementSdk.setValue("selected_persona_label", data.label);
        window.elementSdk.setValue("selected_persona_description", data.description);
        window.elementSdk.setValue("selected_persona", data.persona);
      }

      renderList();
    }

    function toggleDrawer() {
       state.drawerOpen = !state.drawerOpen;
       els.drawerPanel.classList.toggle("open", state.drawerOpen);
    }

    function runSearch(value) {
      state.query = value.trim();
      state.offset = 0;
      state.hasMore = true;
      fetchPersonas(true);
    }

    function updateLoadingState() {
      els.loading.classList.toggle("hidden", !state.loading);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderPersonaItem(item) {
      const selectedClass = item.id === state.selectedPersonaId ? "selected" : "";

      return `
        <button
          type="button"
          class="persona-item ${selectedClass} w-full rounded-2xl px-4 py-3 text-left"
          data-id="${item.id}"
        >
          <div class="flex items-center gap-3">
            <div class="min-w-0">
              <div class="label text-[13px] font-medium leading-tight">${escapeHtml(item.label)}</div>
              <div class="description mt-0.5 text-[11px] leading-snug">${escapeHtml(item.description)}</div>
            </div>
          </div>
        </button>
      `;
    }

    function renderList() {
      els.list.innerHTML = state.items.map(renderPersonaItem).join("");
      els.list.querySelectorAll("[data-id]").forEach((node) => {
        node.addEventListener("click", () => selectPersona(node.dataset.id));
      });
    }

    function setupInfiniteScroll() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) fetchPersonas(false);
        });
      }, {
        root: els.listViewport,
        rootMargin: "120px",
        threshold: 0
      });

      observer.observe(els.sentinel);
    }

    function bindEvents() {
      els.customBtn.addEventListener("click", toggleDrawer);
      els.searchInput.addEventListener("input", (event) => runSearch(event.target.value));
      els.personaInput.addEventListener("input", (event) => {
        if (window.elementSdk?.setValue) {
          window.elementSdk.setValue("custom_persona", event.target.value);
        }
      });
    }

    bindEvents();
    fetchPersonas(true);
    setupInfiniteScroll();
  </script>
</body>
</html>
