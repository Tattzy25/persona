<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Persona Picker</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  //fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'DM Sans', sans-serif; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: #000; }
    ::-webkit-scrollbar { display: none; }

    .persona-item {
      transition: all 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
      background: #000;
    }

    .persona-item .label,
    .persona-item .description {
      transition: color 0.18s ease;
      color: #fff;
    }

    .persona-item:hover {
      background: #fff;
      transform: scale(1.015);
    }

    .persona-item:hover .label,
    .persona-item:hover .description {
      color: #000;
    }

    .persona-item.selected {
      background: #fff;
    }

    .persona-item.selected .label,
    .persona-item.selected .description {
      color: #000;
    }

    #drawerPanel {
      transform: translateY(100%);
      transition: transform 0.3s ease-out;
    }

    #drawerPanel.open {
      transform: translateY(0);
    }
  </style>
</head>
<body class="h-full bg-black">
  <main id="app" class="h-full w-full bg-black flex justify-center">
    <div class="w-[300px] h-full bg-black flex flex-col overflow-hidden relative">
      <div class="bg-white px-4 py-3 flex items-center justify-center rounded-2xl mx-2 my-1.5 h-[72px]">
        <button
          id="customBtn"
          class="bg-black text-white text-[13px] font-medium px-4 py-2 rounded-lg hover:bg-gray-800 transition-colors"
          type="button"
        >
          Custom Persona
        </button>
      </div>

      <div class="px-2 pb-2">
        <input
          id="searchInput"
          type="text"
          placeholder="Search personas..."
          class="w-full rounded-2xl border border-zinc-800 bg-black text-white text-[13px] px-4 py-3 outline-none placeholder:text-zinc-500"
        >
      </div>

      <div id="listViewport" class="flex-1 overflow-y-auto px-2 pb-2">
        <div id="list" class="flex flex-col gap-2"></div>
        <div id="loading" class="hidden py-3 text-center text-[11px] text-zinc-500">Loading...</div>
        <div id="sentinel" class="h-10"></div>
      </div>
    </div>
  </main>

  <div id="drawerPanel" class="fixed bottom-0 right-12 z-30 flex w-292px translate-x-12 flex-col rounded-3xl border border-zinc-200 bg-white" style="height: 50%">
  >
    <textarea
      id="personaInput"
      placeholder="Enter custom persona..."
      class="flex-1 resize-none rounded-3xl border-none bg-white px-4 py-3 text-[12px] text-black focus:outline-none"
    ></textarea>
  </div>

  <script>
    const PERSONA_SOURCE = [
      { id: "girlfriend", label: "Girlfriend", description: "A warm, affectionate, and natural romantic persona.", persona: "You are a warm, supportive, and affectionate partner. You communicate with genuine care and interest in my daily life. You are emotionally present, listen actively, and provide comfort and intimacy in conversation." },
      { id: "tutor", label: "Tutor", description: "A patient, encouraging teacher who explains things clearly and simply.", persona: "You are a knowledgeable and patient tutor. You break down complex ideas into simple explanations, check for understanding, and teach at the user's pace." },
      { id: "best-friend", label: "Best Friend", description: "A loyal, funny, casual persona with real emotional closeness.", persona: "You are a funny, loyal, emotionally intelligent best friend. You are casual, supportive, easy to talk to, and naturally conversational." },
      { id: "therapist", label: "Therapist", description: "A calm, grounded listener who helps process emotions thoughtfully.", persona: "You are a calm, empathetic therapist-like presence. You listen carefully, validate feelings, ask thoughtful questions, and help organize emotional thinking without being cold." },
      { id: "coach", label: "Coach", description: "A direct, motivating persona focused on momentum and action.", persona: "You are a focused and motivating coach. You challenge excuses, encourage momentum, and help turn indecision into clear action." },
      { id: "assistant", label: "Assistant", description: "A sharp, efficient persona built for practical help and execution.", persona: "You are a highly efficient assistant. You are concise, organized, practical, and focused on getting things done quickly and clearly." },
      { id: "mentor", label: "Mentor", description: "A wise, strategic guide with calm leadership energy.", persona: "You are a thoughtful mentor. You guide with calm authority, long-term thinking, and practical wisdom while keeping the user grounded." },
      { id: "creative-director", label: "Creative Director", description: "A bold aesthetic persona with strong taste and visual judgment.", persona: "You are a confident creative director with sharp taste. You give strong visual opinions, refine ideas fast, and push toward polished, high-quality execution." },
      { id: "cofounder", label: "Co-Founder", description: "A startup-minded partner who thinks in systems, leverage, and execution.", persona: "You are a sharp startup co-founder. You think in systems, tradeoffs, leverage, shipping speed, and practical execution." },
      { id: "girlfriend-soft", label: "Soft Girlfriend", description: "A sweeter, more nurturing romantic persona with gentle warmth.", persona: "You are a soft, nurturing, emotionally available girlfriend persona. You are affectionate, reassuring, and naturally warm." },
      { id: "strict-tutor", label: "Strict Tutor", description: "A disciplined teacher who pushes clarity, accuracy, and focus.", persona: "You are a strict but effective tutor. You care about clarity, correctness, and discipline, and you push the user to think carefully." },
      { id: "late-night-friend", label: "Late Night Friend", description: "A chill, honest persona for deep talks and late-night energy.", persona: "You are an honest, chill late-night friend. You are reflective, calm, emotionally open, and easy to confide in." }
    ];

    while (PERSONA_SOURCE.length < 120) {
      const i = PERSONA_SOURCE.length + 1;
      PERSONA_SOURCE.push({
        id: `persona-${i}`,
        label: `Persona ${i}`,
        description: `A generated persona option number ${i} for browsing and search.`,
        persona: `You are persona ${i}. You respond consistently with the tone, behavior, and role associated with this selected option.`
      });
    }

    const state = {
      items: [],
      filteredItems: [],
      visibleCount: 0,
      pageSize: 50,
      selectedPersonaId: null,
      selectedPersonaText: "",
      query: "",
      drawerOpen: false
    };

    const els = {
      list: document.getElementById("list"),
      loading: document.getElementById("loading"),
      sentinel: document.getElementById("sentinel"),
      searchInput: document.getElementById("searchInput"),
      customBtn: document.getElementById("customBtn"),
      drawerPanel: document.getElementById("drawerPanel"),
      personaInput: document.getElementById("personaInput")
    };

    function initState() {
      state.items = PERSONA_SOURCE;
      state.filteredItems = [...state.items];
      state.visibleCount = Math.min(state.pageSize, state.filteredItems.length);
      render();
    }

    function getVisibleItems() {
      return state.filteredItems.slice(0, state.visibleCount);
    }

    function selectPersona(id) {
      const selected = state.items.find(item => item.id === id);
      if (!selected) return;

      state.selectedPersonaId = id;
      state.selectedPersonaText = selected.persona;

      if (window.elementSdk?.setValue) {
        window.elementSdk.setValue("selected_persona_id", selected.id);
        window.elementSdk.setValue("selected_persona_label", selected.label);
        window.elementSdk.setValue("selected_persona_description", selected.description);
        window.elementSdk.setValue("selected_persona", selected.persona);
      }

      renderList();
    }

    function toggleDrawer() {
      state.drawerOpen = !state.drawerOpen;
      els.drawerPanel.classList.toggle("open", state.drawerOpen);
    }

    function runSearch(value) {
      state.query = value.trim().toLowerCase();

      if (!state.query) {
        state.filteredItems = [...state.items];
      } else {
        state.filteredItems = state.items.filter(item =>
          item.id.toLowerCase().includes(state.query) ||
          item.label.toLowerCase().includes(state.query) ||
          item.description.toLowerCase().includes(state.query)
        );
      }

      state.visibleCount = Math.min(state.pageSize, state.filteredItems.length);
      render();
    }

    function loadMore() {
      if (state.visibleCount >= state.filteredItems.length) return;
      els.loading.classList.remove("hidden");

      requestAnimationFrame(() => {
        state.visibleCount = Math.min(
          state.visibleCount + state.pageSize,
          state.filteredItems.length
        );
        renderList();
        updateLoadingState();
      });
    }

    function updateLoadingState() {
      const done = state.visibleCount >= state.filteredItems.length;
      els.loading.classList.toggle("hidden", done);
    }

    function renderPersonaItem(item) {
      const selectedClass = item.id === state.selectedPersonaId ? "selected" : "";

      return `
        <button
          type="button"
          class="persona-item ${selectedClass} w-full rounded-2xl px-4 py-3 text-left"
          data-id="${item.id}"
        >
          <div class="flex items-center gap-3">
            <div class="min-w-0">
              <div class="label text-[13px] font-medium leading-tight">${escapeHtml(item.label)}</div>
              <div class="description mt-0.5 text-[11px] leading-snug">${escapeHtml(item.description)}</div>
            </div>
          </div>
        </button>
      `;
    }

    function renderList() {
      els.list.innerHTML = getVisibleItems().map(renderPersonaItem).join("");

      els.list.querySelectorAll("[data-id]").forEach(node => {
        node.addEventListener("click", () => {
          selectPersona(node.dataset.id);
        });
      });

      updateLoadingState();
    }

    function render() {
      renderList();
      els.searchInput.value = state.query;
      els.drawerPanel.classList.toggle("open", state.drawerOpen);
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setupInfiniteScroll() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            loadMore();
          }
        });
      }, {
        root: document.getElementById("listViewport"),
        rootMargin: "120px",
        threshold: 0
      });

      observer.observe(els.sentinel);
    }

    function bindEvents() {
      els.customBtn.addEventListener("click", toggleDrawer);

      els.searchInput.addEventListener("input", (event) => {
        runSearch(event.target.value);
      });

      els.personaInput.addEventListener("input", (event) => {
        const value = event.target.value;

        if (window.elementSdk?.setValue) {
          window.elementSdk.setValue("custom_persona", value);
        }
      });
    }

    const defaultConfig = {
      widget_title: "Persona Picker"
    };

    function initSdk() {
      if (!window.elementSdk?.init) return;

      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async () => {},
        mapToCapabilities: () => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ["widget_title", config.widget_title || defaultConfig.widget_title]
        ])
      });
    }

    bindEvents();
    initState();
    setupInfiniteScroll();
    initSdk();
  </script>
</body>
</html>
